services:
  postgres:
    image: postgres:17-alpine
    container_name: bufunfometro-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: bufunfometro
      POSTGRES_USER: bufunfometro
      POSTGRES_PASSWORD: bufunfometro
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bufunfometro -d bufunfometro"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
