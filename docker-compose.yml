services:
  postgres:
    image: postgres:17-alpine
    container_name: derycash-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: derycash
      POSTGRES_USER: derycash
      POSTGRES_PASSWORD: derycash
    volumes:
      - derycash_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U derycash -d derycash"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  derycash_postgres_data:
